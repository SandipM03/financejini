name: Keep Supabase Alive

on:

  schedule:
    - cron: '0 */6 * * *'
  
  workflow_dispatch:

jobs:
  ping:
    name: Ping Supabase
    runs-on: ubuntu-latest
    env:
      
      SUPABASE_URL: "${{ secrets.SUPABASE_URL }}"
      SUPABASE_ANON_KEY: "${{ secrets.SUPABASE_ANON_KEY }}"
    steps:
      - name: Show which source will be used for Supabase URL
        run: |
          # Do not print secrets to logs. Just indicate which source will be used.
          if [ -n "${SUPABASE_URL:-}" ]; then
            echo "Using SUPABASE_URL from repository secrets"
          else
            echo "Using fallback SUPABASE_URL"
          fi

      - name: Ping Supabase REST endpoint with retries
        run: |
          set -euxo pipefail

          # Normalize URL (remove trailing slash) and build health paths
          BASE_URL="${SUPABASE_URL%/}"
          REST_URL="$BASE_URL/rest/v1/"
          AUTH_HEALTH_URL="$BASE_URL/auth/v1/health"

          # If you provide an anon key as a secret (recommended), the request will include it.
          API_KEY="$SUPABASE_ANON_KEY"

          # Record whether we're using the secret or the fallback. Do NOT print the URL or key.
          if [ -n "${SUPABASE_URL:-}" ]; then
            USED_SOURCE="secrets"
          else
            USED_SOURCE="fallback"
          fi

          ATTEMPTS=5
          SLEEP=5
          LAST_STATUS=000

          for i in $(seq 1 $ATTEMPTS); do
            echo "Attempt $i: GET Supabase health endpoint (using $USED_SOURCE)"
            HEALTH_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$AUTH_HEALTH_URL" || echo "000")
            echo "Health endpoint HTTP status: $HEALTH_STATUS"

            # If auth health endpoint responds, Supabase is awake.
            if [ "$HEALTH_STATUS" = "200" ] || [ "$HEALTH_STATUS" = "204" ] || [ "$HEALTH_STATUS" = "301" ] || [ "$HEALTH_STATUS" = "302" ]; then
              echo "Supabase responded successfully on auth health endpoint (status=$HEALTH_STATUS)."
              exit 0
            fi

            echo "Health endpoint did not return success (status=$HEALTH_STATUS). Falling back to REST endpoint check..."
            if [ -n "$API_KEY" ]; then
              # Send both apiKey and Authorization headers (Supabase accepts either)
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" -H "apikey: $API_KEY" -H "Authorization: Bearer $API_KEY" "$REST_URL" || echo "000")
            else
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$REST_URL" || echo "000")
            fi

            echo "HTTP status: $STATUS"
            LAST_STATUS=$STATUS

            # For keepalive purposes, 401 still confirms the REST service is reachable.
            # Common success-like responses: 200/204, redirects, and 401 Unauthorized.
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "204" ] || [ "$STATUS" = "301" ] || [ "$STATUS" = "302" ] || [ "$STATUS" = "401" ]; then
              echo "Supabase REST endpoint is reachable (status=$STATUS)."
              exit 0
            fi

            echo "Request failed (status=$STATUS). Sleeping ${SLEEP}s before retry..."
            sleep $SLEEP
            SLEEP=$((SLEEP * 2))
          done

          echo "All $ATTEMPTS attempts failed. Last HTTP status: $LAST_STATUS"
          # Fail the job so you can see the failure in Actions and investigate
          exit 1

      - name: Finished
        if: ${{ always() }}
        run: |
          echo "Ping job finished for $SUPABASE_URL"
